name: Fly Deploy

# Auto-deploy the backend to Fly.io on every push to main.
# Requires a repo secret FLY_API_TOKEN (a Fly deploy token) and the Fly app to
# already exist (created once via `fly launch` / `fly apps create`).
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
