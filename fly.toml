# fly.toml app configuration file generated for aimplified-edge-ai on 2026-07-02T18:19:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aimplified-edge-ai'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
