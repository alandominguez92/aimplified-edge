# fly.toml app configuration file generated for aimplified-edge on 2026-07-02T17:34:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aimplified-edge'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  # uvicorn binds ${PORT:-8000}; set PORT to match http_service.internal_port
  # (8080) so Fly routes to the port the app is actually listening on.
  PORT = '8080'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
