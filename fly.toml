# Fly.io config for the AimplifiedEdge backend (single Docker service:
# FastAPI serves the API + the built frontend). Region + always-on per setup.
app = "aimplified-edge"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # always-on: keep one machine running so the daily scheduler accrues the
  # track record 24/7 and there are no cold starts.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent SQLite (track record + line snapshots) at DATA_DIR=/data.
[[mounts]]
  source = "data"
  destination = "/data"
